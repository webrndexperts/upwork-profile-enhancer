<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upliftio Optimizer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="popup-wrap">
  <div class="p-header">
    <div class="p-brand">
      <div class="p-logo">
        <img src="../assets/icons/icon48.png" alt="">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
      </div>
      <div>
        <div class="p-name">Upliftio Optimizer</div>
        <div class="p-sub">Upwork Profile AI</div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="p-view" id="mainView">
    <div class="status-box" id="statusBox">
      <div class="status-icon-wrap" id="statusIconWrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      </div>
      <div class="status-msg" id="statusMsg">Visit an Upwork freelancer profile to analyze it</div>
    </div>

    <button class="go-btn" id="goBtn" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
      Analyze Profile
    </button>

    <div id="historySection" style="display:none">
      <div class="section-lbl">Recent</div>
      <div id="historyList"></div>
    </div>

    <div class="free-note">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      100% Free · No data collection
    </div>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
