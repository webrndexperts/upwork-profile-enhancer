<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RND Optimizer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="popup-wrap">
  <div class="p-header">
    <div class="p-brand">
      <div class="p-logo">
        <img src="../assets/icons/icon48.png" alt="">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
      </div>
      <div>
        <div class="p-name">RND Optimizer</div>
        <div class="p-sub">Upwork Profile AI</div>
      </div>
    </div>
    <button class="p-gear-btn" id="gearBtn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <!-- Main -->
  <div class="p-view" id="mainView">
    <div class="status-box" id="statusBox">
      <div class="status-icon-wrap" id="statusIconWrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      </div>
      <div class="status-msg" id="statusMsg">Visit an Upwork freelancer profile to analyze it</div>
    </div>

    <button class="go-btn" id="goBtn" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
      Analyze Profile
    </button>

    <div id="historySection" style="display:none">
      <div class="section-lbl">Recent</div>
      <div id="historyList"></div>
    </div>

    <div class="free-note">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      100% Free · No data collection
    </div>
  </div>

  <!-- Settings -->
  <div class="p-view" id="settingsView" style="display:none">
    <div class="s-header-row">
      <button class="s-back" id="backBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <span>Settings</span>
    </div>

    <div class="s-group">
      <div class="s-label">
        Gemini API Key
        <a href="https://aistudio.google.com/app/apikey" target="_blank" class="s-key-link">Get free →</a>
      </div>
      <div class="s-input-wrap">
        <input type="password" id="apiInput" placeholder="AIzaSy..." class="s-input" autocomplete="off" spellcheck="false">
        <button id="toggleBtn" class="s-toggle">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="s-hint">Stored locally. Never shared.</div>
    </div>

    <button class="s-save-btn" id="saveBtn">Save API Key</button>
    <div class="s-msg" id="saveMsg"></div>

    <div class="s-divider"></div>

    <div class="s-group">
      <div class="s-label">History</div>
      <button class="s-danger-btn" id="clearBtn">Clear Analysis History</button>
    </div>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
